<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Prediction</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #18211f;
            background: #f4f7f5;
        }

        main {
            width: min(960px, calc(100% - 32px));
            margin: 40px auto;
        }

        h1 {
            margin-bottom: 8px;
            font-size: 32px;
        }

        p {
            margin-top: 0;
            color: #52605b;
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            margin-top: 28px;
            padding: 24px;
            border: 1px solid #d9e2dd;
            border-radius: 8px;
            background: #ffffff;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            min-height: 42px;
            padding: 10px 12px;
            border: 1px solid #b8c7c0;
            border-radius: 6px;
            font-size: 16px;
        }

        input:focus,
        select:focus {
            outline: 2px solid #3b7f69;
            outline-offset: 2px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        button {
            min-height: 44px;
            padding: 10px 18px;
            border: 0;
            border-radius: 6px;
            color: #ffffff;
            background: #2f6f5b;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #245747;
        }

        .result {
            margin-top: 24px;
            padding: 18px;
            border-left: 4px solid #2f6f5b;
            background: #ffffff;
            font-size: 20px;
            font-weight: 700;
        }

        @media (max-width: 680px) {
            main {
                margin: 24px auto;
            }

            form {
                grid-template-columns: 1fr;
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Forest Fire Weather Index Prediction</h1>
        <p>Enter the forest weather values to predict the Fire Weather Index.</p>

        <form action="{{ url_for('predict_data') }}" method="POST">
            <div class="form-group">
                <label for="Temperature">Temperature</label>
                <input type="number" step="any" id="Temperature" name="Temperature" placeholder="Example: 29" required>
            </div>

            <div class="form-group">
                <label for="RH">Relative Humidity</label>
                <input type="number" step="any" id="RH" name="RH" placeholder="Example: 57" required>
            </div>

            <div class="form-group">
                <label for="Ws">Wind Speed</label>
                <input type="number" step="any" id="Ws" name="Ws" placeholder="Example: 18" required>
            </div>

            <div class="form-group">
                <label for="Rain">Rain</label>
                <input type="number" step="any" id="Rain" name="Rain" placeholder="Example: 0.0" required>
            </div>

            <div class="form-group">
                <label for="FFMC">FFMC</label>
                <input type="number" step="any" id="FFMC" name="FFMC" placeholder="Example: 65.7" required>
            </div>

            <div class="form-group">
                <label for="DMC">DMC</label>
                <input type="number" step="any" id="DMC" name="DMC" placeholder="Example: 3.4" required>
            </div>

            <div class="form-group">
                <label for="ISI">ISI</label>
                <input type="number" step="any" id="ISI" name="ISI" placeholder="Example: 1.3" required>
            </div>

            <div class="form-group">
                <label for="Classes">Classes</label>
                <select id="Classes" name="Classes" required>
                    <option value="">Select fire class</option>
                    <option value="0">Not Fire</option>
                    <option value="1">Fire</option>
                </select>
            </div>

            <div class="form-group">
                <label for="Region">Region</label>
                <select id="Region" name="Region" required>
                    <option value="">Select region</option>
                    <option value="0">Bejaia</option>
                    <option value="1">Sidi Bel-abbes</option>
                </select>
            </div>

            <div class="full-width">
                <button type="submit">Predict</button>
            </div>
        </form>

        {% if results is defined %}
            <div class="result">
                Predicted Fire Weather Index: {{ results }}
            </div>
        {% endif %}
    </main>
</body>
</html>
